data:
  dataset: german_credit      # switch to home_credit in Phase 2
  val_size: 0.15
  test_size: 0.15
  random_state: 42

models:
  random_forest:
    n_estimators: 200
    max_depth: 10
    random_state: 42

  xgboost:
    n_estimators: 300
    learning_rate: 0.05
    max_depth: 6
    subsample: 0.8
    colsample_bytree: 0.8
    random_state: 42

  lightgbm:
    n_estimators: 300
    learning_rate: 0.05
    num_leaves: 31
    random_state: 42

mlflow:
  experiment_name: creditiq-experiments
  tracking_uri: mlruns